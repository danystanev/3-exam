<section class="page page-add-recipe container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <p class="eyebrow text-uppercase fw-semibold mb-2">Add Recipe</p>
          <h1 class="h3 fw-bold mb-3">Create a New Recipe</h1>
          <p class="text-muted mb-4">Fill in the details below to publish a new recipe.</p>

          <div class="alert d-none mb-3" id="add-recipe-message" role="alert" aria-live="polite"></div>

          <form class="needs-validation d-grid gap-3" id="add-recipe-form" novalidate>
            <div>
              <label class="form-label" for="title">Title</label>
              <input class="form-control" id="title" name="title" type="text" placeholder="Recipe title" minlength="3" required />
              <div class="invalid-feedback">Recipe title is required.</div>
            </div>

            <div>
              <label class="form-label" for="ingredients">Ingredients</label>
              <textarea class="form-control" id="ingredients" name="ingredients" rows="4" placeholder="List ingredients separated by lines" minlength="10" required></textarea>
              <div class="invalid-feedback">Ingredients are required.</div>
            </div>

            <div>
              <label class="form-label" for="instructions">Instructions</label>
              <textarea class="form-control" id="instructions" name="instructions" rows="6" placeholder="Describe how to prepare the recipe" minlength="20" required></textarea>
              <div class="invalid-feedback">Instructions are required.</div>
            </div>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label" for="cookingTime">Cooking time</label>
                <div class="input-group">
                  <input class="form-control" id="cookingTime" name="cookingTime" type="number" min="1" step="1" placeholder="30" required />
                  <span class="input-group-text">min</span>
                </div>
                <div class="invalid-feedback">Cooking time is required.</div>
              </div>

              <div class="col-md-4">
                <label class="form-label" for="difficulty">Difficulty</label>
                <select class="form-select" id="difficulty" name="difficulty" required>
                  <option value="">Select difficulty</option>
                  <option value="Easy">Easy</option>
                  <option value="Medium">Medium</option>
                  <option value="Hard">Hard</option>
                </select>
                <div class="invalid-feedback">Please choose a difficulty level.</div>
              </div>

              <div class="col-md-4">
                <label class="form-label" for="category">Category</label>
                <select class="form-select" id="category" name="category" required>
                  <option value="">Select category</option>
                  <option value="Breakfast">Breakfast</option>
                  <option value="Lunch">Lunch</option>
                  <option value="Dinner">Dinner</option>
                  <option value="Dessert">Dessert</option>
                  <option value="Salad">Salad</option>
                  <option value="Soup">Soup</option>
                </select>
                <div class="invalid-feedback">Please choose a category.</div>
              </div>
            </div>

            <div>
              <label class="form-label" for="image">Image upload</label>
              <input class="form-control" id="image" name="image" type="file" accept="image/*" required />
              <div class="invalid-feedback">Please upload an image.</div>
            </div>

            <div class="d-flex flex-column flex-sm-row gap-2 pt-2">
              <button class="btn btn-primary btn-lg" type="submit">Save Recipe</button>
              <button class="btn btn-outline-secondary btn-lg" type="reset">Clear Form</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
