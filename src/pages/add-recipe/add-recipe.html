<section class="page page-add-recipe container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <p class="eyebrow text-uppercase fw-semibold mb-2" data-i18n="pages.addRecipe.eyebrow"></p>
          <h1 class="h3 fw-bold mb-3" data-i18n="pages.addRecipe.title"></h1>
          <p class="text-muted mb-4" data-i18n="pages.addRecipe.subtitle"></p>

          <div class="alert d-none mb-3" id="add-recipe-message" role="alert" aria-live="polite"></div>

          <form class="needs-validation d-grid gap-3" id="add-recipe-form" novalidate>
            <div>
              <label class="form-label" for="title" data-i18n="pages.addRecipe.titleLabel"></label>
              <input class="form-control" id="title" name="title" type="text" data-i18n-placeholder="pages.addRecipe.titlePlaceholder" minlength="3" required />
              <div class="invalid-feedback" data-i18n="pages.addRecipe.titleInvalid"></div>
            </div>

            <div>
              <label class="form-label" for="ingredients" data-i18n="pages.addRecipe.ingredientsLabel"></label>
              <textarea class="form-control" id="ingredients" name="ingredients" rows="4" data-i18n-placeholder="pages.addRecipe.ingredientsPlaceholder" minlength="10" required></textarea>
              <div class="invalid-feedback" data-i18n="pages.addRecipe.ingredientsInvalid"></div>
            </div>

            <div>
              <label class="form-label" for="instructions" data-i18n="pages.addRecipe.instructionsLabel"></label>
              <textarea class="form-control" id="instructions" name="instructions" rows="6" data-i18n-placeholder="pages.addRecipe.instructionsPlaceholder" minlength="20" required></textarea>
              <div class="invalid-feedback" data-i18n="pages.addRecipe.instructionsInvalid"></div>
            </div>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label" for="cookingTime" data-i18n="pages.addRecipe.cookingTimeLabel"></label>
                <div class="input-group">
                  <input class="form-control" id="cookingTime" name="cookingTime" type="number" min="1" step="1" data-i18n-placeholder="pages.addRecipe.cookingTimePlaceholder" required />
                  <span class="input-group-text" data-i18n="pages.addRecipe.minutes"></span>
                </div>
                <div class="invalid-feedback" data-i18n="pages.addRecipe.cookingTimeInvalid"></div>
              </div>

              <div class="col-md-4">
                <label class="form-label" for="difficulty" data-i18n="pages.addRecipe.difficultyLabel"></label>
                <select class="form-select" id="difficulty" name="difficulty" required>
                  <option value="" data-i18n="pages.addRecipe.difficultyPlaceholder"></option>
                  <option value="Easy" data-i18n="forms.difficulty.easy"></option>
                  <option value="Medium" data-i18n="forms.difficulty.medium"></option>
                  <option value="Hard" data-i18n="forms.difficulty.hard"></option>
                </select>
                <div class="invalid-feedback" data-i18n="pages.addRecipe.difficultyInvalid"></div>
              </div>

              <div class="col-md-4">
                <label class="form-label" for="category" data-i18n="pages.addRecipe.categoryLabel"></label>
                <select class="form-select" id="category" name="category" required>
                  <option value="" data-i18n="pages.addRecipe.categoryPlaceholder"></option>
                  <option value="Breakfast" data-i18n="forms.category.breakfast"></option>
                  <option value="Lunch" data-i18n="forms.category.lunch"></option>
                  <option value="Dinner" data-i18n="forms.category.dinner"></option>
                  <option value="Dessert" data-i18n="forms.category.dessert"></option>
                  <option value="Salad" data-i18n="forms.category.salad"></option>
                  <option value="Soup" data-i18n="forms.category.soup"></option>
                </select>
                <div class="invalid-feedback" data-i18n="pages.addRecipe.categoryInvalid"></div>
              </div>
            </div>

            <div>
              <label class="form-label" for="image" data-i18n="pages.addRecipe.imageLabel"></label>
              <input class="form-control" id="image" name="image" type="file" accept="image/*" required />
              <div class="invalid-feedback" data-i18n="pages.addRecipe.imageInvalid"></div>
            </div>

            <div class="d-flex flex-column flex-sm-row gap-2 pt-2">
              <button class="btn btn-primary btn-lg" type="submit" data-i18n="pages.addRecipe.save"></button>
              <button class="btn btn-outline-secondary btn-lg" type="reset" data-i18n="pages.addRecipe.clear"></button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
