<section class="page container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <p class="eyebrow text-uppercase fw-semibold mb-2" data-i18n="pages.register.eyebrow"></p>
          <h1 class="h3 fw-bold mb-4" data-i18n="pages.register.title"></h1>
          <div class="alert d-none mb-3" id="register-message" role="alert" aria-live="polite"></div>
          <form class="needs-validation d-grid gap-3" id="register-form" novalidate>
            <div>
              <label class="form-label" for="fullName" data-i18n="pages.register.fullNameLabel"></label>
              <input class="form-control" id="fullName" name="fullName" type="text" data-i18n-placeholder="pages.register.fullNamePlaceholder" required minlength="2" />
              <div class="invalid-feedback" data-i18n="pages.register.fullNameInvalid"></div>
            </div>
            <div>
              <label class="form-label" for="email" data-i18n="pages.register.emailLabel"></label>
              <input class="form-control" id="email" name="email" type="email" data-i18n-placeholder="pages.register.emailPlaceholder" required />
              <div class="invalid-feedback" data-i18n="pages.register.emailInvalid"></div>
            </div>
            <div>
              <label class="form-label" for="password" data-i18n="pages.register.passwordLabel"></label>
              <input class="form-control" id="password" name="password" type="password" data-i18n-placeholder="pages.register.passwordPlaceholder" required minlength="6" />
              <div class="invalid-feedback" data-i18n="pages.register.passwordInvalid"></div>
            </div>
            <div>
              <label class="form-label" for="confirmPassword" data-i18n="pages.register.confirmPasswordLabel"></label>
              <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" data-i18n-placeholder="pages.register.confirmPasswordPlaceholder" required minlength="6" />
              <div class="invalid-feedback" data-i18n="pages.register.confirmPasswordInvalid"></div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit" data-i18n="pages.register.submit"></button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
