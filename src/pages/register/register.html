<section class="page container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <p class="eyebrow text-uppercase fw-semibold mb-2">Register</p>
          <h1 class="h3 fw-bold mb-4">Create an account</h1>
          <form class="needs-validation d-grid gap-3" id="register-form" novalidate>
            <div>
              <label class="form-label" for="fullName">Full name</label>
              <input class="form-control" id="fullName" name="fullName" type="text" placeholder="Your name" required minlength="2" />
              <div class="invalid-feedback">Full name is required.</div>
            </div>
            <div>
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" placeholder="you@example.com" required />
              <div class="invalid-feedback">Email is required and must be a valid email address.</div>
            </div>
            <div>
              <label class="form-label" for="password">Password</label>
              <input class="form-control" id="password" name="password" type="password" placeholder="Password" required minlength="6" />
              <div class="invalid-feedback">Password is required and must be at least 6 characters long.</div>
            </div>
            <div>
              <label class="form-label" for="confirmPassword">Confirm password</label>
              <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat your password" required minlength="6" />
              <div class="invalid-feedback">Please confirm your password.</div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">Create account</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
