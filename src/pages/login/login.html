<section class="page page-login container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <p class="eyebrow text-uppercase fw-semibold mb-2" data-i18n="pages.login.eyebrow"></p>
          <h1 class="h3 fw-bold mb-4" data-i18n="pages.login.title"></h1>
          <p class="text-muted mb-3" data-i18n="pages.login.subtitle"></p>
          <div class="alert d-none mb-3" id="login-message" role="alert" aria-live="polite"></div>
          <form class="needs-validation d-grid gap-3" id="login-form" novalidate>
            <div>
              <label class="form-label" for="email" data-i18n="pages.login.emailLabel"></label>
              <input class="form-control" id="email" name="email" type="email" data-i18n-placeholder="pages.login.emailPlaceholder" required />
              <div class="invalid-feedback" data-i18n="pages.login.emailInvalid"></div>
            </div>
            <div>
              <label class="form-label" for="password" data-i18n="pages.login.passwordLabel"></label>
              <input class="form-control" id="password" name="password" type="password" minlength="6" data-i18n-placeholder="pages.login.passwordPlaceholder" required />
              <div class="invalid-feedback" data-i18n="pages.login.passwordInvalid"></div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit" data-i18n="pages.login.submit"></button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
