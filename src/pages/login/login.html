<section class="page page-login container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <p class="eyebrow text-uppercase fw-semibold mb-2">Login</p>
          <h1 class="h3 fw-bold mb-4">Welcome back</h1>
          <p class="text-muted mb-3">Use the demo controls to switch the navbar state.</p>
          <form class="d-grid gap-3" id="login-form">
            <div>
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" type="email" placeholder="you@example.com" />
            </div>
            <div>
              <label class="form-label" for="password">Password</label>
              <input class="form-control" id="password" type="password" placeholder="Password" />
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-primary btn-lg" type="submit">Login as user</button>
              <button class="btn btn-outline-dark" type="button" data-demo-login="admin">Login as admin</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
